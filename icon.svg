<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%"  stop-color="#2b2622"/>
      <stop offset="60%" stop-color="#1c1916"/>
      <stop offset="100%" stop-color="#100e0c"/>
    </radialGradient>
    <linearGradient id="ray" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffb489"/>
      <stop offset="45%" stop-color="#e8865a"/>
      <stop offset="100%" stop-color="#c75f3a"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#2a2521"/>
      <stop offset="100%" stop-color="#16130f"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="224" fill="none" stroke="#000" stroke-opacity="0.35" stroke-width="2"/>

  <g transform="translate(512,512)" filter="url(#glow)">
    <g filter="url(#soft)">
      <g id="b" fill="url(#ray)">
        <!-- raggio rastremato: largo al centro, punta arrotondata -->
        <path d="M0,-360 C26,-360 40,-330 40,-300 L24,-70 C24,-40 14,-24 0,-24 C-14,-24 -24,-40 -24,-70 L-40,-300 C-40,-330 -26,-360 0,-360 Z"/>
      </g>
      <use href="#b" transform="rotate(45)"/>
      <use href="#b" transform="rotate(90)"/>
      <use href="#b" transform="rotate(135)"/>
      <use href="#b" transform="rotate(180)"/>
      <use href="#b" transform="rotate(225)"/>
      <use href="#b" transform="rotate(270)"/>
      <use href="#b" transform="rotate(315)"/>
    </g>
    <circle r="78" fill="url(#core)"/>
    <circle r="78" fill="none" stroke="#e8865a" stroke-opacity="0.25" stroke-width="3"/>
  </g>

  <!-- highlight superiore vetroso -->
  <rect x="64" y="56" width="896" height="360" rx="200" fill="#ffffff" opacity="0.045"/>
</svg>
